version: "3.9"

# ---------------------------------------------------------------------------
# Usage
# ---------------------------------------------------------------------------
# AP mode (default):
#   docker compose -f docker-compose-cap.yaml up --build
#
# CP mode:
#   CONFIG_MODE=cp docker compose -f docker-compose-cap.yaml up --build
#
# Partition simulation (disconnect node3 from the internal network):
#   docker network disconnect crdt_layer_kv_net kv-node3
#
# Heal the partition:
#   docker network connect crdt_layer_kv_net kv-node3
# ---------------------------------------------------------------------------

x-replica-common: &replica-common
  build:
    context: .
    dockerfile: Dockerfile-crdt
  networks:
    - kv_net
  environment:
    CONFIG_FILE: /app/config.yaml
    CONFIG_MODE: ${CONFIG_MODE:-ap}         # override with env var
    REPLICATION_TIMEOUT: "1.0"

networks:
  kv_net:
    driver: bridge

services:
  node1:
    <<: *replica-common
    container_name: kv-node1
    environment:
      CONFIG_FILE: /app/config.yaml
      CONFIG_MODE: ${CONFIG_MODE:-ap}
      NODE_ID: node1
      NODE_PORT: "5000"
      PEERS: "http://node2:5000,http://node3:5000"
    ports:
      - "5001:5000"

  node2:
    <<: *replica-common
    container_name: kv-node2
    environment:
      CONFIG_FILE: /app/config.yaml
      CONFIG_MODE: ${CONFIG_MODE:-ap}
      NODE_ID: node2
      NODE_PORT: "5000"
      PEERS: "http://node1:5000,http://node3:5000"
    ports:
      - "5002:5000"

  node3:
    <<: *replica-common
    container_name: kv-node3
    environment:
      CONFIG_FILE: /app/config.yaml
      CONFIG_MODE: ${CONFIG_MODE:-ap}
      NODE_ID: node3
      NODE_PORT: "5000"
      PEERS: "http://node1:5000,http://node2:5000"
    ports:
      - "5003:5000"

  client:
    image: python:3.12-slim
    container_name: kv-client
    networks:
      - kv_net
    depends_on:
      - node1
      - node2
      - node3
    volumes:
      - ./client:/client
    working_dir: /client
    command: >
      sh -c "pip install requests --quiet && python test_kv.py"
    environment:
      NODE1: "http://node1:5000"
      NODE2: "http://node2:5000"
      NODE3: "http://node3:5000"
      CONFIG_MODE: ${CONFIG_MODE:-ap}